backend:
  name: git-gateway
  repo: execbuilds/thescenarioroom
  branch: main
  identity_url: https://auth.decapbridge.com/sites/YOUR-SITE-ID  # from DecapBridge dashboard
  gateway_url: https://gateway.decapbridge.com

media_folder: "images"
public_folder: "images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Middle East", "Asia-Pacific", "Europe", "Americas", "Global Risk", "Supply Chain"] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
